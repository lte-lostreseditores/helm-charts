# Configuración por defecto para servicios Spring Boot
# Este archivo define los valores por defecto para el chart springboot-service

# Configuración de la imagen
image:
  repository: ""  # Requerido: nombre de la imagen
  digest: ""      # Digest SHA256 de la imagen (recomendado para producción)
  tag: "latest"   # Tag de la imagen (solo si digest está vacío)
  pullPolicy: IfNotPresent

# Configuración de réplicas
replicaCount: 1

# Configuración de recursos (obligatorio)
resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 500m
    memory: 512Mi

# Variables de entorno
env:
  - name: SPRING_PROFILES_ACTIVE
    value: "production"
  - name: SERVER_PORT
    value: "8080"
  # Ejemplo de secret:
  # - name: DB_PASSWORD
  #   valueFrom:
  #     secretKeyRef:
  #       name: app-secrets
  #       key: db-password

# Opcional: variables desde Secret/ConfigMap (p. ej. External Secrets + SSM)
envFrom: []

# ConfigMap para variables de entorno adicionales
config:
  # Ejemplo de configuración:
  # LOGGING_LEVEL_ROOT: INFO
  # SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/mydb

# Configuración del servicio
service:
  type: ClusterIP
  port: 80
  targetPort: 8080

# Opcional (gestion-lte-back prod): definir startupProbe con httpGet para aplazar liveness/readiness

# Configuración de health checks
livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: 8080
  initialDelaySeconds: 60
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: 8080
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

# Configuración de HPA (Horizontal Pod Autoscaler)
hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  # Si se define (p. ej. 75), añade métrica memory utilization al HPA v2.
  targetMemoryUtilizationPercentage: null
  # behavior: opcional (map autoscaling/v2). Si se omite, el HPA usa el default del API server.

# Configuración de seguridad
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000
  capabilities:
    drop:
    - ALL

# Configuración de afinidad y toleraciones
affinity: {}
tolerations: []
nodeSelector: {}

# Configuración de PodDisruptionBudget
podDisruptionBudget:
  minAvailable: 1

# Configuración de NetworkPolicy
networkPolicy:
  enabled: true
  allowEgressWeb: false  # Permitir tráfico HTTP/HTTPS saliente

# Configuración de ServiceMonitor (Prometheus)
serviceMonitor:
  enabled: false
  port: metrics
  path: /actuator/prometheus
  interval: 30s
  scrapeTimeout: 10s

# Labels extra (cost/ownership). No incluir app.kubernetes.io/name ni instance aquí:
# ya vienen de springboot-service.labels / selectorLabels y duplicarlas rompe YAML/kustomize.
labels:
  app.kubernetes.io/part-of: lte-gestion
  owner: platform
  cost-center: engineering

# Configuración de ServiceAccount
serviceAccount:
  create: true
  annotations: {}
  name: ""

# Configuración de namespace
namespace: lte-gestion-dev
