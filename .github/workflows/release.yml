name: Release Helm Chart

on:
  push:
    tags:
      - 'chart/springboot-service/v*'
  # Tras corregir el workflow, ejecutar manualmente si el tag ya existía y no quieres retaguear.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: [self-hosted, linux, arm64, lte-ci]
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Configure Git
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"

    - name: Set up Helm
      uses: azure/setup-helm@v3
      with:
        version: '3.12.0'

    - name: Package Chart
      run: |
        helm package charts/springboot-service/
        ls -la *.tgz

    - name: Update index and push gh-pages
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        set -euo pipefail
        AUTH_ORIGIN="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
        INDEX_URL="https://${GITHUB_REPOSITORY_OWNER}.github.io/helm-charts"

        mkdir -p gh-pages

        if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
          git clone --branch gh-pages --single-branch "$AUTH_ORIGIN" gh-pages
        else
          mkdir -p gh-pages
          cd gh-pages
          git init
          git remote add origin "$AUTH_ORIGIN"
          cd ..
        fi

        mv *.tgz gh-pages/
        cd gh-pages

        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"

        helm repo index . --url "$INDEX_URL"

        git add .
        git commit -m "Release springboot-service ${{ github.ref_name }}"
        git remote set-url origin "$AUTH_ORIGIN"
        git push origin HEAD:gh-pages
